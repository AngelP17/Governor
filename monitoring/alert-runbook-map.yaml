alerts:
  HighPodRestartRate:
    severity: warning
    runbook: runbooks/pod-crash.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    description: "Pod restart count exceeds threshold within 5 minutes"
    remediation_script: scripts/remediate_pod_crash.sh
  PodCrashLoopBackOff:
    severity: critical
    runbook: runbooks/pod-crash.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    description: "Pod stuck in CrashLoopBackOff state"
    remediation_script: scripts/remediate_pod_crash.sh
  HighErrorRate:
    severity: warning
    runbook: runbooks/deployment-rollback.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    description: "HTTP 5xx error rate exceeds 5%"
    remediation_script: scripts/remediate_deployment_rollback.sh
  HighLatencyP95:
    severity: warning
    runbook: runbooks/high-latency.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    description: "P95 latency exceeds 500ms on health endpoint"
    remediation_script: scripts/remediate_high_latency.sh
  InsufficientReplicas:
    severity: warning
    runbook: runbooks/deployment-rollback.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    description: "Available replicas below desired count"
    remediation_script: scripts/remediate_deployment_rollback.sh
  ServiceDown:
    severity: critical
    runbook: runbooks/pod-crash.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    description: "No available replicas for the deployment"
    remediation_script: scripts/remediate_pod_crash.sh
  HighErrorRateFastBurn:
    severity: critical
    runbook: runbooks/deployment-rollback.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    remediation_script: scripts/remediate_deployment_rollback.sh
    description: "Error rate exceeds 10% over 2 minutes (fast budget burn)"
  HighErrorRateSlowBurn:
    severity: warning
    runbook: runbooks/deployment-rollback.md
    snapshot_script: scripts/capture_incident_snapshot.sh
    remediation_script: scripts/remediate_deployment_rollback.sh
    description: "Error rate exceeds 2% over 30 minutes (slow budget burn)"
