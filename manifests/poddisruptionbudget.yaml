# This PodDisruptionBudget ensures that at least 2 of the 3 resilience-pilot
# replicas remain available during voluntary disruptions such as node drains,
# cluster upgrades, or rolling deployments. This prevents a quorum loss scenario
# where too many pods are simultaneously evicted.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: resilience-pilot-pdb
  namespace: default
  labels:
    app: resilience-pilot
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: resilience-pilot
